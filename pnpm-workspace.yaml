packages:
  - 'client'
  - 'server'
ignoreWorkspaceRootCheck: true
# Force patched versions of vulnerable transitive deps.
# NOTE: pnpm reads `overrides` here (or `pnpm.overrides` in package.json) —
# it does NOT honor the top-level `resolutions` field (that's Yarn).
overrides:
  axios: '^1.16.0'
  cookie: '^0.7.0'
  effect: '^3.20.0'
  fast-uri: '^3.1.2'
  postcss: '^8.5.10'
  qs: '^6.15.2'
  # Scoped to the 5.x line only — 1.x/2.x consumers (older eslint tooling) must stay put.
  'brace-expansion@5': '^5.0.6'
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  sharp: true
